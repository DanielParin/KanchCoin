<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Gradiente para dar efecto 3D a la moneda -->
    <radialGradient id="coinFace" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFF0A0"></stop>
      <stop offset="70%" stop-color="#F5B700"></stop>
      <stop offset="100%" stop-color="#D98F00"></stop>
    </radialGradient>

    <linearGradient id="coinEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B87400"></stop>
      <stop offset="50%" stop-color="#E0A000"></stop>
      <stop offset="100%" stop-color="#B87400"></stop>
    </linearGradient>
  </defs>

  <!-- Borde grueso de la moneda (efecto metal) -->
  <circle cx="100" cy="100" r="92" fill="url(#coinEdge)"></circle>

  <!-- Cara de la moneda -->
  <circle cx="100" cy="100" r="85" fill="url(#coinFace)"></circle>

  <!-- Sombra interna para dar profundidad -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="4"></circle>

  <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(120,70,0,0.25)" stroke-width="4"></circle>

  <!-- Letra K en estilo grabado -->
  <text x="100" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="88" font-weight="bold" fill="#FFF8E1" stroke="#8A5A00" stroke-width="3">
    K
  </text>

</svg>
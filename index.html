<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>KanchCoin</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" type="image/svg+xml" href="Logo.svg">
    </head>
    <body>
    <div class="container">
        <div class="scene">
            <div id="coin" class="coin">
                <div class="coin-face coin-front">CARA</div>
                <div class="coin-face coin-back">CRUZ</div>
            </div>
            <div id="edgeOverlay" class="edge-overlay">
                <div class="edge-bar"></div>
            </div>
        </div>

        <button id="flipBtn">Lanzar KanchCoin</button>
        <h2 id="result"></h2>
    </div>

    <script src="scripts.js"></script>
    <audio id="coinSound" src="coin.mp3"></audio>
    </body>
</html>
